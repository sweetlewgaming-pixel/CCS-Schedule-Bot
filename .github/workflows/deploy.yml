name: Deploy Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Oracle
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          APP_DIR: ${{ secrets.ORACLE_APP_DIR }}
          APP_NAME: ccs-scheduler-bot
        run: |
          ssh "${ORACLE_USER}@${ORACLE_HOST}" "set -e; cd '${APP_DIR}'; git fetch origin main; git reset --hard origin/main; chmod +x ./scripts/start-bot.sh; npm ci --omit=dev; npx playwright install chromium; pm2 startOrReload ecosystem.config.js --update-env; pm2 save; sleep 3; pm2 status; pm2 describe '${APP_NAME}'; tail -n 80 ~/.pm2/logs/${APP_NAME}-error.log || true; tail -n 40 ~/.pm2/logs/${APP_NAME}-out.log || true"
